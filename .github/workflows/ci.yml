name: CI Build Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore SecuroTronGUI.csproj

      - name: Build
        run: dotnet build SecuroTronGUI.csproj --no-restore --configuration Release

      - name: Confirm build success
        run: echo "Build completed successfully!"